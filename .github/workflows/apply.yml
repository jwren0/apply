name: Submit application
on:
  push:
    branches:
      - main

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v2

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install Deps
        run: |
          python3 -m venv ./venv
          source ./venv/bin/activate
          python3 -m pip install -r ./requirements.txt

      - name: Apply
        env:
          APPLY_URL:     ${{ secrets.APPLY_URL }}
          APPLY_SECRET:  ${{ secrets.APPLY_SECRET }}
          APPLY_NAME:    ${{ secrets.APPLY_NAME }}
          APPLY_EMAIL:   ${{ secrets.APPLY_EMAIL }}
          APPLY_CV_LINK: ${{ secrets.APPLY_CV_LINK }}
          GIT_REPO_LINK: ${{ github.server_url }}/${{ github.repository }}
          GIT_RUN_LINK:  ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          source ./venv/bin/activate
          python3 ./src/main.py
